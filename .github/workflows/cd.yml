name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build api web admin
      - name: Health-gated deploy (staging)
        run: |
          docker compose up -d postgres redis
          sleep 10
          curl -f http://localhost:4000/health || exit 1

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Promote to production
        run: echo "Production deploy gated on staging health check"

  rollback:
    if: failure()
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - run: echo "One-click rollback — redeploy previous image tag from registry"
